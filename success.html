<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Inquiry Sent
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;

    background:#050505;

    color:#F5F1E8;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    padding:7%;

    font-family:'Inter',sans-serif;
}

.success-box h1{
    font-family:'Cormorant Garamond',serif;

    font-size:5rem;
    font-weight:300;

    margin-bottom:25px;
}

.success-box p{
    color:#BEBEBE;

    line-height:2;

    max-width:620px;

    margin:auto auto 45px;
}

.success-box a{
    display:inline-block;

    padding:18px 42px;

    border:1px solid rgba(255,255,255,0.12);

    color:#F5F1E8;

    text-decoration:none;

    letter-spacing:3px;

    font-size:0.78rem;

    transition:0.5s ease;
}

.success-box a:hover{
    background:#F5F1E8;

    color:#050505;
}

@media(max-width:600px){

    .success-box h1{
        font-size:3rem;
    }

}

</style>

</head>

<body>

<div class="success-box">

    <h1>
        Inquiry Submitted
    </h1>

    <p>

        Thank you for reaching out to Kagona.
        Your inquiry has been received successfully.
        We will respond shortly with the next steps
        regarding your project.

    </p>

    <a href="index.html">

        RETURN HOME

    </a>

</div>

</body>

</html>
